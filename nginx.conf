worker_processes 1;
worker_rlimit_nofile 64;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 32;
    multi_accept off;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log off;

    sendfile       on;
    tcp_nopush     on;
    tcp_nodelay    on;

    keepalive_timeout    5;
    keepalive_requests   20;
    reset_timedout_connection on;

    # Minimal buffers — static files only, no uploads
    client_body_buffer_size     8k;
    client_header_buffer_size   1k;
    large_client_header_buffers 2 1k;
    client_max_body_size        1k;
    output_buffers              1 32k;

    server_tokens off;

    gzip on;
    gzip_comp_level 1;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/manifest+json;
    gzip_min_length 1024;

    server {
        listen 8080;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # config.json — served from /conf/ (mounted at runtime, never baked into image)
        location = /config.json {
            alias /conf/config.json;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            add_header Pragma "no-cache";
        }

        # Service worker — must not be cached
        location = /sw.js {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            add_header Service-Worker-Allowed "/";
        }

        # Static assets — cache for 1 day
        location ~* \.(css|js|png|svg|ico|webp|woff2?)$ {
            add_header Cache-Control "public, max-age=86400, immutable";
        }

        # manifest.json
        location = /manifest.json {
            add_header Cache-Control "public, max-age=3600";
        }

        # SPA fallback — serve index.html for all other paths
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache";
        }

        # Security headers
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header Referrer-Policy no-referrer;
    }
}
