<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#1a1d23"/>
  <!-- House shape -->
  <g transform="translate(256,256)" fill="none" stroke="#58a6ff" stroke-linecap="round" stroke-linejoin="round">
    <!-- Roof -->
    <polyline points="-150,30 0,-130 150,30" stroke-width="30"/>
    <!-- Walls -->
    <rect x="-110" y="30" width="220" height="160" rx="6" stroke-width="28" fill="none"/>
    <!-- Door -->
    <rect x="-35" y="95" width="70" height="95" rx="6" stroke-width="20" fill="none"/>
    <!-- Window left -->
    <rect x="-95" y="60" width="45" height="45" rx="6" stroke-width="18" fill="none"/>
    <!-- Window right -->
    <rect x="50" y="60" width="45" height="45" rx="6" stroke-width="18" fill="none"/>
  </g>
</svg>
