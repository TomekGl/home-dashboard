<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Home Dashboard</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f0f2f5">
  <meta name="theme-color" media="(prefers-color-scheme: dark)"  content="#0d1117">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Home">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">

  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <h1>Home Dashboard</h1>
    <div class="controls">
      <span id="last-updated"></span>
      <button id="btn-refresh" title="Refresh now" aria-label="Refresh now">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
      </button>
      <button id="btn-pause" title="Pause auto-refresh" aria-label="Pause auto-refresh">
        <svg id="icon-pause" viewBox="0 0 24 24" fill="currentColor">
          <rect x="6" y="4" width="4" height="16" rx="1"/>
          <rect x="14" y="4" width="4" height="16" rx="1"/>
        </svg>
        <svg id="icon-play" viewBox="0 0 24 24" fill="currentColor" style="display:none">
          <polygon points="5,3 19,12 5,21"/>
        </svg>
      </button>
    </div>
  </header>

  <main id="dashboard">
    <div class="loading">Loading configuration…</div>
  </main>

  <script src="/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
